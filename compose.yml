# agentibrain-kernel — root compose for local non-k8s deployment.
#
# Quickstart:
#   ./local/bootstrap.sh   # generates .env + scaffolds ./vault
#   docker compose up -d
#
# Optional Ollama overlay for local AI tick:
#   docker compose -f compose.yml -f local/compose.ollama.yml up -d
#
# See local/README.md for full docs (inference modes, troubleshooting, etc.).

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentibrain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brain}
      POSTGRES_DB: ${POSTGRES_DB:-brain}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./local/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "${PORT_POSTGRES:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brain} -d ${POSTGRES_DB:-brain}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: agentibrain_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "${PORT_REDIS:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  embeddings:
    build:
      context: ./services/embeddings
      dockerfile: Dockerfile
    image: ghcr.io/the-cloud-clockwork/agentibrain-embeddings:local
    container_name: agentibrain_embeddings
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://brain:brain@postgres:5432/brain}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_EMBED_MODEL: ${LLM_EMBED_MODEL:-text-embedding-3-small}
      # Pin the vector dimension when LLM_EMBED_MODEL is not a recognised
      # family; required for unknown models (the service refuses to guess).
      EMBED_DIM: ${EMBED_DIM:-}
      # Opt in to dropping existing embeddings when the model dimension
      # changes. Off by default — a mismatch is reported, not silently wiped.
      EMBED_DIM_FORCE_MIGRATE: ${EMBED_DIM_FORCE_MIGRATE:-}
      API_KEYS: ${EMBEDDINGS_API_KEYS:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${PORT_EMBEDDINGS:-8102}:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  brain-api:
    build:
      context: ./services/brain-api
      dockerfile: Dockerfile
    image: ghcr.io/the-cloud-clockwork/agentibrain-brain-api:local
    container_name: agentibrain_brain_api
    restart: unless-stopped
    depends_on:
      embeddings:
        condition: service_healthy
    environment:
      EMBEDDINGS_URL: http://embeddings:8080
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      KB_ROUTER_TOKEN: ${KB_ROUTER_TOKEN:-}
      INFERENCE_URL: ${INFERENCE_URL:-}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY:-}
      BRAIN_CLASSIFY_MODEL: ${BRAIN_CLASSIFY_MODEL:-brain-classify}
      VAULT_ROOT: /vault
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${VAULT_ROOT_HOST:-./vault}:/vault
    ports:
      - "${PORT_BRAIN_API:-8103}:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tick-cron:
    build:
      context: ./services/brain-ops
      dockerfile: Dockerfile
    image: ghcr.io/the-cloud-clockwork/agentibrain-brain-ops:local
    container_name: agentibrain_tick_cron
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      brain-api:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        INTERVAL="$${TICK_INTERVAL_SECONDS:-7200}"
        echo "[tick-cron] starting; interval=$${INTERVAL}s"
        FLAGS=""
        if [ -z "$${INFERENCE_URL}" ]; then
          FLAGS="--no-ai"
          echo "[tick-cron] INFERENCE_URL not set — running deterministic only"
        fi
        while true; do
          DATE=$$(date -u +%Y-%m-%d)
          HOUR=$$(date -u +%H)
          OUTDIR="/vault/clusters/$${DATE}"
          mkdir -p "$${OUTDIR}" 2>/dev/null || true

          # Extraction: once daily at the first tick of the day (hour 04)
          if [ "$${HOUR}" = "04" ] && [ -d /shared/.claude/projects ]; then
            echo "[tick-cron] extraction: since=26h min-turns=5"
            python3 /app/extract.py --since 26h --min-turns 5 \
              --projects-dir /shared/.claude/projects \
              | python3 /app/cluster.py --out-dir "$${OUTDIR}" \
              || echo "[tick-cron] extraction failed (continuing)"
          fi

          # Hybrid brain tick
          python3 /app/brain_tick.py \
            --vault /vault \
            --brain-feed /vault/brain-feed \
            $${FLAGS} \
            || echo "[tick-cron] brain_tick failed (continuing)"

          # Refresh arc embeddings + prune orphans
          if [ -n "$${EMBEDDINGS_API_KEY}" ]; then
            python3 /app/embed_arcs.py --vault /vault --prune \
              || echo "[tick-cron] embed_arcs failed (non-fatal)"
          fi

          echo "[tick-cron] sleeping $${INTERVAL}s until next tick"
          sleep "$${INTERVAL}"
        done
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/11}
      INFERENCE_URL: ${INFERENCE_URL:-}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY:-}
      BRAIN_BRIEF_MODEL: ${BRAIN_BRIEF_MODEL:-brain-brief}
      EMBEDDINGS_URL: http://embeddings:8080
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      BRAIN_DECAY_START_DAYS: ${BRAIN_DECAY_START_DAYS:-2}
      BRAIN_DECAY_INTERVAL_DAYS: ${BRAIN_DECAY_INTERVAL_DAYS:-2}
      BRAIN_STALE_SIGNAL_DAYS: ${BRAIN_STALE_SIGNAL_DAYS:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${VAULT_ROOT_HOST:-./vault}:/vault

  tick-drain:
    build:
      context: ./services/brain-ops
      dockerfile: Dockerfile
    image: ghcr.io/the-cloud-clockwork/agentibrain-brain-ops:local
    container_name: agentibrain_tick_drain
    restart: unless-stopped
    depends_on:
      brain-api:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        INTERVAL="$${TICK_DRAIN_INTERVAL_SECONDS:-30}"
        REQ=/vault/brain-feed/ticks/requested
        DONE=/vault/brain-feed/ticks/completed
        FAIL=/vault/brain-feed/ticks/failed
        mkdir -p "$$REQ" "$$DONE" "$$FAIL"
        # Deliberate divergences from the Kubernetes tick-drain CronJob, which
        # runs this same body. Everything else is intentionally identical:
        #   * This is a long-lived daemon polling every TICK_DRAIN_INTERVAL_SECONDS;
        #     the CronJob runs the body once per schedule fire.
        #   * The CronJob does `sleep 5; ls "$$REQ"` first to defeat a stale NFS
        #     attribute cache on a freshly-mounted pod. Not needed here — this
        #     process mounts once and re-lists on every pass.
        #   * Log lines are prefixed "[tick-drain]" here, bare "drain:" there.
        echo "[tick-drain] starting; interval=$${INTERVAL}s"
        while true; do
          # Bucket pending requests by (dry_run, no_ai). Requests of the same
          # kind are interchangeable, so N of them collapse into ONE tick —
          # an agent calling brain_tick repeatedly must not queue N full ticks.
          # Coalescing lives here, not at enqueue time: this loop is the only
          # serialized consumer, so it can scan-then-decide without racing.
          b00=""; b01=""; b10=""; b11=""; total=0
          for f in "$$REQ"/*.json; do
            [ -e "$$f" ] || break
            dry=$$(python3 -c "import json;print('1' if json.load(open('$$f')).get('dry_run') else '0')" 2>/dev/null || echo 0)
            noai=$$(python3 -c "import json;print('1' if json.load(open('$$f')).get('no_ai') else '0')" 2>/dev/null || echo 0)
            total=$$((total+1))
            case "$${dry}$${noai}" in
              00) b00="$$b00 $$f" ;;
              01) b01="$$b01 $$f" ;;
              10) b10="$$b10 $$f" ;;
              11) b11="$$b11 $$f" ;;
            esac
          done

          if [ "$$total" -gt 0 ]; then
            ok=0; ko=0; ticks=0; stuck=0
            run_kind() {
              kind_flags="$$1"; kind_files="$$2"
              [ -n "$$kind_files" ] || return 0
              n=$$(echo $$kind_files | wc -w)
              ticks=$$((ticks+1))
              echo "[tick-drain] coalescing $$n request(s) into one tick [flags='$$kind_flags']"
              if python3 /app/brain_tick.py \
                  --vault /vault --brain-feed /vault/brain-feed \
                  --inference-url "$${INFERENCE_URL:-}" \
                  --source brain-drain $$kind_flags; then
                dest="$$DONE"; ok=$$((ok+n))
              else
                dest="$$FAIL"; ko=$$((ko+n))
              fi
              # A failed mv must NOT abort the batch. By this point the tick has
              # already run and mutated the vault, and other buckets are still
              # queued; dying here under `set -e` would discard completed work,
              # skip every remaining bucket, emit no summary, and — because this
              # container restarts unless-stopped — respawn into a tight loop
              # that re-runs the tick every time. Warn, count, keep going.
              for f in $$kind_files; do
                if ! mv "$$f" "$$dest/$$(basename "$$f")"; then
                  stuck=$$((stuck+1))
                  echo "[tick-drain] WARN: could not move $$(basename "$$f") to $$dest — retrying next pass"
                fi
              done
              # Never let the loop's last exit status become the function's, or
              # `set -e` kills the script at the call site.
              return 0
            }
            run_kind "" "$$b00"
            run_kind "--no-ai" "$$b01"
            run_kind "--dry-run" "$$b10"
            run_kind "--dry-run --no-ai" "$$b11"
            echo "[tick-drain] drain-summary: total=$$total ticks=$$ticks ok=$$ok failed=$$ko stuck=$$stuck"

            # Refresh the semantic index. Without this the tick rewrites the
            # vault but pgvector stays stale, so kb_search / brain_search_arcs
            # cannot see the new content — the whole point of an on-demand
            # tick. Non-fatal: the request's verdict belongs to brain_tick.py.
            if [ "$$ok" -gt 0 ] && [ -n "$${EMBEDDINGS_API_KEY:-}" ]; then
              echo "[tick-drain] refreshing embeddings after $$ok processed request(s)"
              python3 /app/embed_arcs.py --vault /vault --prune \
                || echo "[tick-drain] embed_arcs failed (non-fatal)"
            fi
          fi
          sleep "$$INTERVAL"
        done
    environment:
      INFERENCE_URL: ${INFERENCE_URL:-}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY:-}
      BRAIN_BRIEF_MODEL: ${BRAIN_BRIEF_MODEL:-brain-brief}
      EMBEDDINGS_URL: http://embeddings:8080
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      # Must mirror tick-cron: a drain-triggered tick and a scheduled tick have
      # to promote/demote arcs identically, or heat oscillates between them.
      BRAIN_DECAY_START_DAYS: ${BRAIN_DECAY_START_DAYS:-2}
      BRAIN_DECAY_INTERVAL_DAYS: ${BRAIN_DECAY_INTERVAL_DAYS:-2}
      BRAIN_STALE_SIGNAL_DAYS: ${BRAIN_STALE_SIGNAL_DAYS:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${VAULT_ROOT_HOST:-./vault}:/vault

  amygdala:
    build:
      context: ./services/brain-ops
      dockerfile: Dockerfile
    image: ghcr.io/the-cloud-clockwork/agentibrain-brain-ops:local
    container_name: agentibrain_amygdala
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command:
      - /app/amygdala.py
      - --continuous
      - --poll-interval
      - "5"
      - --redis-url
      - ${REDIS_URL:-redis://redis:6379/11}
      - --vault
      - /vault
      - --brain-feed
      - /vault/brain-feed
    environment:
      AMYGDALA_STREAMS: ${AMYGDALA_STREAMS:-events:health,events:host,events:deploy,events:system,events:brain}
      AMYGDALA_CONSUMER: ${AMYGDALA_CONSUMER:-amygdala-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${VAULT_ROOT_HOST:-./vault}:/vault

  mcp:
    build:
      context: ./services/mcp
      dockerfile: Dockerfile
    image: ghcr.io/the-cloud-clockwork/agentibrain-mcp:local
    container_name: agentibrain_mcp
    restart: unless-stopped
    depends_on:
      brain-api:
        condition: service_healthy
    environment:
      INFERENCE_URL: ${INFERENCE_URL:-}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY:-}
      BRAIN_BRIEF_MODEL: ${BRAIN_BRIEF_MODEL:-brain-brief}
      BRAIN_API_URL: http://brain-api:8080
      KB_ROUTER_TOKEN: ${KB_ROUTER_TOKEN:-}
      EMBEDDINGS_URL: http://embeddings:8080
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      MCP_PROXY_API_KEY: ""
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${PORT_MCP:-8104}:8080"

volumes:
  pg-data:
  redis-data:
