# -- agentihooks fields (read by install.py) --
name: brain-keeper
description: "Brain-keeper daemon — vault maintenance, heat recomputation, frontal-lobe promotion/demotion, _hot-arcs.md generation"
mcp_categories:
  - tools-knowledge
  - tools-notifications

enabledMcpServers:
  - hooks-utils
  - tools-knowledge
  - tools-notifications

otel:
  # Leave endpoint blank for local dev / fresh installs — the agenticore runtime
  # skips OTel export when the endpoint is empty. Operators override in their
  # deployment via the agent's env (OTEL_EXPORTER_OTLP_ENDPOINT) or via an
  # overlay profile.
  enabled: true
  endpoint: ""
  protocol: grpc
  resource_attributes:
    agent.name: brain-keeper
    agent.type: daemon
  langfuse:
    # Langfuse export is optional. Operators wire their own endpoint + keys via
    # agent secrets; the kernel ships with placeholders only.
    enabled: false
    endpoint: ""
    public_key: ""
    secret_key: ""

claude:
  model: "claude-sonnet-4-6"
  permission_mode: bypassPermissions
  effort: medium
