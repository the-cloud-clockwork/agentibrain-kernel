# App-of-apps for the agentibrain-kernel brain stack.
#
# Apply once: `kubectl apply -f k8s/argocd/root.yaml`
# This reconciles every per-service app under k8s/argocd/{dev,prod}/.
#
# Defaults to the `dev` env. For prod, change `path` to k8s/argocd/prod
# and `targetRevision` to `main`.
#
# Forking: replace `repoURL` with your fork. The per-service apps inside
# also need their values overlay `repoURL` pointed at your platform repo
# (look for `ref: values` in each app yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentibrain-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/The-Cloud-Clock-Work/agentibrain-kernel.git
    targetRevision: dev
    path: k8s/argocd/dev
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
