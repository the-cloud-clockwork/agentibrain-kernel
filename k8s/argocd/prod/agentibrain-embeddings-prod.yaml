apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentibrain-embeddings-prod
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: embed=ghcr.io/the-cloud-clock-work/agentibrain-embeddings:latest
    argocd-image-updater.argoproj.io/embed.update-strategy: digest
    argocd-image-updater.argoproj.io/embed.allow-tags: regexp:^latest$
    argocd-image-updater.argoproj.io/embed.helm.image-name: tpl.app.image.repository
    argocd-image-updater.argoproj.io/embed.helm.image-tag: tpl.app.image.tag
    argocd-image-updater.argoproj.io/embed.pull-secret: secret:argocd/argocd-image-updater-ghcr#credentials
    argocd-image-updater.argoproj.io/write-back-method: argocd
    argocd-image-updater.argoproj.io/embed.force-update: "true"
  labels:
    image-updater/image: agentibrain-embeddings
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  - repoURL: https://github.com/The-Cloud-Clock-Work/agentibrain-kernel.git
    targetRevision: v0.1.1
    path: helm/embeddings
    helm:
      valueFiles:
      - $values/k8s/values/agentibrain-embeddings/values-prod.yaml
  - repoURL: https://github.com/The-Cloud-Clock-Work/antoncore.git
    targetRevision: main
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: anton-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
