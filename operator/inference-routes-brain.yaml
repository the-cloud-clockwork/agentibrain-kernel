# Brain-only inference routes — reference for kernel forks.
#
# These are the LLM aliases the brain stack consumes:
#   - kb-router-classify  — kb-router /ingest message classifier (Haiku)
#   - kb-brief            — kb_brief synthesis (Sonnet → Haiku fallback)
#   - kb-dispatch         — kb_dispatch bundle prompt synthesis (Sonnet)
#   - kb-converse-intent  — kb_converse intent classifier (Haiku)
#
# Operators who run their own LiteLLM / inference-gateway can mount this
# file (or merge it into their own routes config) so the brain has the
# routes it expects. Anton's reference deploy carries an antoncore-side
# inference-gateway that mounts a superset of these routes alongside other
# operator-only routes (pr-summary, narration, etc.); see
# antoncore/workflows/inference-routes.yaml for the operator superset.
#
# Forks without a real inference-gateway can ignore this file entirely —
# the kernel falls back to deterministic-only behaviour when the route
# call fails (kb-router /ingest still works without classification, just
# slower; kb_brief just returns hits with no synthesis).

defaults:
  timeout_seconds: 120
  max_retries: 2
  backoff_factor: 0.5
  max_wait_seconds: 30

routes:
  kb-router-classify:
    model: claude-max-haiku
    max_retries: 1
    backoff_factor: 0.3
    timeout_seconds: 45
    fallback_model: gemini-2.0-flash

  kb-brief:
    model: claude-max-sonnet
    fallback_model: claude-max-haiku
    max_retries: 3
    backoff_factor: 0.8
    max_wait_seconds: 20
    timeout_seconds: 120

  kb-dispatch:
    model: claude-max-sonnet
    fallback_model: claude-max-haiku
    max_retries: 3
    backoff_factor: 1.0
    max_wait_seconds: 30
    timeout_seconds: 180

  kb-converse-intent:
    model: claude-max-haiku
    fallback_model: claude-max-sonnet
    max_retries: 2
    backoff_factor: 0.4
    max_wait_seconds: 15
    timeout_seconds: 60
