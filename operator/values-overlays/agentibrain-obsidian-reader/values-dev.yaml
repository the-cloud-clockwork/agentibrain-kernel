# Operator overlay — agentibrain-obsidian-reader (anton-dev)
# Layered on top of agentibrain-kernel/helm/obsidian-reader/values.yaml.
tpl:
  global:
    environment: dev
  app:
    image:
      tag: latest
  # Operator's vault — NFS-backed on Anton's Unraid filer (same vault as prod;
  # both envs read the operator's single Obsidian source of truth).
  extraVolumes:
    - name: nfs-vault
      nfs:
        server: 10.10.30.130
        path: /mnt/user/appdata/obsidian/vault
  extraVolumeMounts:
    - name: nfs-vault
      mountPath: /vault
