# Operator overlay — agentibrain-embeddings (anton-dev)
tpl:
  global:
    environment: dev
  app:
    image:
      tag: latest
  # ESO enabled here because chart default is `false` (kernel portability).
  externalSecret:                                # nosecret
    enabled: true                                # nosecret
    storeName: openbao                           # nosecret
    awsSecretPath: k8s/agentibrain-embeddings-dev # nosecret
    targetSecretName: embeddings-secrets         # nosecret
