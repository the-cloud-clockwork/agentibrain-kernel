# Operator overlay — agentibrain-kb-router (anton-dev)
# Layered on top of agentibrain-kernel/helm/kb-router/values.yaml.
tpl:
  global:
    environment: dev
  app:
    image:
      tag: dev
  env:
    variables:
      OBSIDIAN_READER_URL: http://agentibrain-obsidian-reader.anton-dev.svc:8080
      EMBEDDINGS_URL: http://agentibrain-embeddings.anton-dev.svc:8080
      # Brain-blind LLM gateway — points at LiteLLM dev. The brain speaks
      # standard OpenAI chat-completions; LiteLLM resolves brain-classify /
      # brain-brief into claude-max-haiku / claude-max-sonnet via auth-broker.
      INFERENCE_URL: http://litellm.anton-dev.svc:4000
      BRAIN_CLASSIFY_MODEL: brain-classify
      BRAIN_BRIEF_MODEL: brain-brief
  # ESO enabled here because chart default is `false` (kernel portability,
  # 2026-04-30). Forks without OpenBao create the K8s Opaque Secret manually
  # via local/k8s-bootstrap.sh and skip this overlay.
  externalSecret:                                  # nosecret
    enabled: true                                  # nosecret
    storeName: openbao                             # nosecret
    secretPath: k8s/agentibrain-router-dev         # nosecret
    targetSecretName: agentibrain-router-secrets   # nosecret
    # Pull INFERENCE_API_KEY from the brain-inference virtual key path
    # (managed by litellm-state CI). Lives in the SAME K8s Secret so the
    # pod env injection picks it up via the existing envFrom.
    extraData:                                     # nosecret
      - secretKey: INFERENCE_API_KEY               # nosecret
        remoteRef:                                 # nosecret
          key: k8s/brain-inference                 # nosecret
          property: INFERENCE_API_KEY              # nosecret
  # Operator's vault — NFS-backed on Anton's Unraid filer.
  extraVolumes:
    - name: nfs-vault
      nfs:
        server: 10.10.30.130
        path: /mnt/user/appdata/obsidian/vault
  extraVolumeMounts:
    - name: nfs-vault
      mountPath: /vault
