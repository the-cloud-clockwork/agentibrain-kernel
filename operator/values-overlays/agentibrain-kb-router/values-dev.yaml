# Operator overlay — agentibrain-kb-router (anton-dev)
# Layered on top of agentibrain-kernel/helm/kb-router/values.yaml.
tpl:
  global:
    environment: dev
  app:
    image:
      tag: dev
  env:
    variables:
      OBSIDIAN_READER_URL: http://agentibrain-obsidian-reader.anton-dev.svc:8080
      EMBEDDINGS_URL: http://agentibrain-embeddings.anton-dev.svc:8080
  # ESO enabled here because chart default is `false` (kernel portability,
  # 2026-04-30). Forks without OpenBao create the K8s Opaque Secret manually
  # via local/k8s-bootstrap.sh and skip this overlay.
  externalSecret:                                  # nosecret
    enabled: true                                  # nosecret
    storeName: openbao                             # nosecret
    secretPath: k8s/agentibrain-router-dev         # nosecret
    targetSecretName: agentibrain-router-secrets   # nosecret
  # Operator's vault — NFS-backed on Anton's Unraid filer.
  extraVolumes:
    - name: nfs-vault
      nfs:
        server: 10.10.30.130
        path: /mnt/user/appdata/obsidian/vault
  extraVolumeMounts:
    - name: nfs-vault
      mountPath: /vault
