tpl:
  global:
    environment: prod
  app:
    image:
      tag: latest
  # Operator's k3s cluster uses local-path; the kernel chart default is "" (cluster
  # default) for portability, so we pin it here to match the existing bound PVC.
  # PVC spec is immutable post-binding — must match what's deployed.
  persistence:
    enabled: true
    volumes:
      - name: shared-fs
        size: 5Gi
        accessMode: ReadWriteOnce
        storageClass: local-path
        mountPath: /shared
  env:
    variables:
      AGENTIBRIDGE_URL: http://agentibridge.anton-prod.svc:8100
      OTEL_RESOURCE_ATTRIBUTES: "agent.name=brain-keeper,environment=prod,agent.type=brain-ops"
      # Brain registries — kernel owns the brain-keeper agent + profile.
      # Generic agentihub/agentihooks-bundle were brain-decoupled in Phase 7;
      # point both at the kernel itself which carries agents/brain-keeper/
      # and profiles/brain-keeper/ at repo root.
      # Use isolated paths so brain-keeper's clone does not collide with the
      # generic agentihub clone used by publisher / agenticore / etc. on the
      # same shared volume.
      AGENTICORE_AGENTIHUB_URL: https://github.com/The-Cloud-Clock-Work/agentibrain-kernel
      AGENTICORE_AGENTIHUB_PATH: /shared/agentibrain-kernel-hub
      AGENTICORE_AGENTIHOOKS_BUNDLE_URL: https://github.com/The-Cloud-Clock-Work/agentibrain-kernel
      AGENTICORE_AGENTIHOOKS_BUNDLE_PATH: /shared/agentibrain-kernel-bundle
