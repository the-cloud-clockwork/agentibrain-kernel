tpl:
  fullnameOverride: agentibrain-embeddings
  enableServiceLinks: false
  podAnnotations:
    reloader.stakater.com/auto: "true"
  env:
    variables: null
  global:
    environment: dev
    project: agentibrain
  app:
    name: agentibrain-embeddings
    type: statefulset
    image:
      repository: ghcr.io/the-cloud-clockwork/agentibrain-embeddings
      tag: latest
      pullPolicy: Always
    replicaCount: 1
    container:
      port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    healthChecks:
      enabled: true
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
  secrets:
    enabled: true
    external:
      enabled: true
      # Reuse the existing embeddings-secrets (same schema: POSTGRES_URL, LLM_API_*).
      secretName: embeddings-secrets
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
  ingress:
    enabled: false
  database:
    enabled: false
  configMap:
    enabled: false
  securityContext:
    enabled: false
  serviceAccount:
    create: false
  rbac:
    create: false
  # ghcr.io images are public — pull secret only needed for forked private builds.
  imagePullSecrets: []
  # ExternalSecrets (ESO) — disabled by default. Operators with OpenBao /
  # AWS SM / Vault flip enabled and point at their store. Without ESO, create
  # the K8s Opaque Secret manually (POSTGRES_URL, LLM_API_KEY, LLM_API_BASE,
  # LLM_EMBED_MODEL, EMBEDDINGS_API_KEYS) — see local/k8s-bootstrap.sh.
  externalSecret:                                  # nosecret
    enabled: false                                 # nosecret
    storeName: ""                                  # nosecret
    secretPath: k8s/agentibrain-embeddings-dev  # nosecret
    targetSecretName: embeddings-secrets           # nosecret
