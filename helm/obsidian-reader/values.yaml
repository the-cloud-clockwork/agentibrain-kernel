tpl:
  fullnameOverride: agentibrain-obsidian-reader
  enableServiceLinks: false
  podAnnotations:
    reloader.stakater.com/auto: "true"
  global:
    environment: dev
    project: agentibrain
  app:
    name: agentibrain-obsidian-reader
    type: statefulset
    image:
      repository: ghcr.io/the-cloud-clockwork/agentibrain-obsidian-reader
      tag: latest
      pullPolicy: Always
    replicaCount: 1
    container:
      port: 8080
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 384Mi
    healthChecks:
      enabled: true
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 30
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
  env:
    variables:
      VAULT_ROOT: /vault
      RAW_INBOX_PREFIX: raw/inbox
      LOG_LEVEL: INFO
  secrets:
    enabled: true
    external:
      enabled: true
      secretName: agentibrain-router-secrets
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
  ingress:
    enabled: false
  database:
    enabled: false
  configMap:
    enabled: false
  securityContext:
    enabled: false
  serviceAccount:
    create: false
  rbac:
    create: false
  # ghcr.io images are public — pull secret only needed for forked private builds.
  imagePullSecrets: []
  externalSecret:
    enabled: false
  # Vault mount — choose ONE pattern: NFS (server+path) or PVC (claimName).
  # Default is empty: chart installs cleanly, vault reads will 500 until mounted.
  # See README for full examples.
  extraVolumes: []
  extraVolumeMounts: []
