{{- if .Values.tickDrain.enabled }}
# Tick queue consumer. The kb-router /tick endpoint enqueues tick requests as
# JSON files under {vault}/brain-feed/ticks/requested/. This CronJob drains
# them on a short cadence, runs brain_tick.py per request, and moves each file
# to ticks/completed/ (exit 0) or ticks/failed/ (non-zero). Idempotent:
# drain loop exits immediately when the queue is empty.
#
# Concurrency: Forbid — never overlap with itself or with the main brain-cron.
# Main brain-cron runs every 2h; drain runs every {{ .Values.tickDrain.schedule }}.
# Since they share concurrencyPolicy: Forbid only within their own lineage,
# operators should keep drain short (< 60s per file) to avoid clashing with
# the scheduled 2h tick.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Chart.Name }}-tick-drain
spec:
  schedule: {{ .Values.tickDrain.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.tickDrain.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.tickDrain.failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: {{ .Values.tickDrain.activeDeadlineSeconds | default 300 }}
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: tick-drain
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  REQ=/vault/brain-feed/ticks/requested
                  DONE=/vault/brain-feed/ticks/completed
                  FAIL=/vault/brain-feed/ticks/failed
                  mkdir -p "$DONE" "$FAIL"
                  # Force NFS attribute cache refresh — freshly mounted NFS caches stale dir listings
                  sleep 5
                  ls "$REQ"/ > /dev/null 2>&1 || true
                  count=0; ok=0; ko=0
                  for f in "$REQ"/*.json; do
                    [ -e "$f" ] || break
                    count=$((count+1))
                    name=$(basename "$f")
                    dry=$(python3 -c "import json,sys;d=json.load(open('$f'));print('1' if d.get('dry_run') else '0')" 2>/dev/null || echo 0)
                    noai=$(python3 -c "import json,sys;d=json.load(open('$f'));print('1' if d.get('no_ai') else '0')" 2>/dev/null || echo 0)
                    flags=""
                    [ "$dry" = "1" ] && flags="$flags --dry-run"
                    [ "$noai" = "1" ] && flags="$flags --no-ai"
                    echo "drain: $name flags='$flags'"
                    if python3 /app/brain_tick.py \
                        --vault /vault --brain-feed /vault/brain-feed \
                        --inference-url "${INFERENCE_URL:-}" \
                        $flags; then
                      mv "$f" "$DONE/$name"
                      ok=$((ok+1))
                    else
                      mv "$f" "$FAIL/$name"
                      ko=$((ko+1))
                    fi
                  done
                  echo "drain-summary: total=$count ok=$ok failed=$ko"
                  # Refresh the pgvector index for whatever the tick(s) just
                  # rewrote. Without this an on-demand tick updates the vault
                  # but leaves kb_search / brain_search_arcs blind to the new
                  # content until the scheduled 2h cron. embed_arcs.py is
                  # diff-only by mtime, so one run after the batch is cheap.
                  # Non-fatal, and skipped entirely on an empty drain.
                  if [ "$ok" -gt 0 ] && [ -n "${EMBEDDINGS_API_KEY:-}" ]; then
                    echo "drain: refreshing embeddings for $ok processed tick(s)"
                    python3 /app/embed_arcs.py --vault /vault --prune \
                      || echo "WARN: embed_arcs failed (non-fatal)"
                  fi
              # Full env map, matching the main brain-cron container, so a
              # drain-triggered brain_tick.py runs with the SAME tuning
              # (BRAIN_DECAY_*, BRAIN_PROMOTE_HEAT, EMBEDDINGS_URL, ...) as the
              # scheduled tick — on-demand and scheduled ticks stay identical.
              {{- if or .Values.env .Values.secretRef .Values.additionalSecretRefs }}
              env:
                {{- range $key, $value := .Values.env }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
              {{- if or .Values.secretRef .Values.additionalSecretRefs }}
              envFrom:
                {{- if .Values.secretRef }}
                - secretRef:
                    name: {{ .Values.secretRef }}
                {{- end }}
                {{- range .Values.additionalSecretRefs }}
                - secretRef:
                    name: {{ . }}
                {{- end }}
              {{- end }}
              {{- end }}
              resources:
                {{- toYaml (.Values.tickDrain.resources | default .Values.resources) | nindent 16 }}
              volumeMounts:
                {{- if and .Values.nfsVault .Values.nfsVault.server }}
                - name: nfs-vault
                  mountPath: /vault
                {{- else if .Values.vaultPVC }}
                - name: vault
                  mountPath: /vault
                {{- end }}
          volumes:
            {{- if and .Values.nfsVault .Values.nfsVault.server }}
            - name: nfs-vault
              nfs:
                server: {{ .Values.nfsVault.server }}
                path: {{ .Values.nfsVault.path }}
            {{- else if .Values.vaultPVC }}
            - name: vault
              persistentVolumeClaim:
                claimName: {{ .Values.vaultPVC }}
            {{- end }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- range . }}
            - name: {{ . }}
            {{- end }}
          {{- end }}
{{- end }}
