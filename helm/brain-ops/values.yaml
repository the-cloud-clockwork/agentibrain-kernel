# Generic defaults for brain-cron (tick CronJob + amygdala Deployment).
#
# Ticks every 2 hours by default. The tick-engine image is ghcr.io/the-cloud-clockwork/agentibrain-brain-ops.
# Operators override environment-specific values (NFS server, INFERENCE_URL, secrets)
# in their per-env values overlay (e.g. values-prod.yaml).

schedule: "7 */2 * * *"

image:
  repository: ghcr.io/the-cloud-clockwork/agentibrain-brain-ops
  tag: latest
  pullPolicy: Always

command:
  - /bin/sh
  - -c
  - |
    set -euo pipefail
    NTFY_URL="${NTFY_URL:-}"

    notify_failure() {
      if [ -n "$NTFY_URL" ]; then
        wget -q --post-data="brain-ops FAILED at $(date -u +%H:%M) UTC: $1" \
          --header="Title: Brain Cron Failure" \
          --header="Priority: high" \
          --header="Tags: skull,brain" \
          "$NTFY_URL/alerts" -O /dev/null 2>/dev/null || true
      fi
      exit 1
    }

    DATE=$(date -u +%Y-%m-%d)
    HOUR=$(date -u +%H)
    OUTDIR="/vault/clusters/$DATE"
    mkdir -p "$OUTDIR"
    chmod 777 "$OUTDIR"

    # Extraction: gated to one tick per day (EXTRACT_HOUR, default 04:00 UTC).
    # All extraction knobs are env-driven (EXTRACT_*) so operators configure
    # them in their values overlay without forking this script.
    EXTRACT_HOUR="${EXTRACT_HOUR:-04}"
    EXTRACT_SINCE="${EXTRACT_SINCE:-26h}"
    EXTRACT_MIN_TURNS="${EXTRACT_MIN_TURNS:-5}"
    EXTRACT_PROJECTS_DIR="${EXTRACT_PROJECTS_DIR:-/shared/.claude/projects}"
    if [ "$HOUR" = "$EXTRACT_HOUR" ]; then
      echo "Brain extraction: since=$EXTRACT_SINCE min-turns=$EXTRACT_MIN_TURNS projects-dir=$EXTRACT_PROJECTS_DIR out=$OUTDIR"
      python3 /app/extract.py --since "$EXTRACT_SINCE" --min-turns "$EXTRACT_MIN_TURNS" \
        --projects-dir "$EXTRACT_PROJECTS_DIR" \
        | python3 /app/cluster.py --out-dir "$OUTDIR" \
        || notify_failure "extraction phase"
      echo "Extraction done."
    else
      echo "Skipping extraction (hour=$HOUR, runs at $EXTRACT_HOUR only)."
    fi

    echo "Running hybrid brain tick (with AI)..."
    python3 /app/brain_tick.py --vault /vault --brain-feed /vault/brain-feed \
      --inference-url "${INFERENCE_URL:-}" \
      || notify_failure "brain tick phase"
    echo "Brain tick complete."

    # Refresh embeddings + reap orphans. Diff-only by mtime, so the cost
    # is bounded to whatever the tick just rewrote. --prune deletes pgvector
    # rows whose cluster_id no longer has an arc file (graduations, merges,
    # renames). Failure is non-fatal — kb_search still works on stale rows.
    echo "Refreshing arc embeddings + pruning orphans..."
    if [ -n "${EMBEDDINGS_API_KEY:-}" ]; then
      python3 /app/embed_arcs.py --vault /vault --prune \
        || echo "WARN: embed_arcs failed (non-fatal)"
      echo "Embeddings refresh complete."
    else
      echo "Skipping embed_arcs (EMBEDDINGS_API_KEY not set)."
    fi

    echo "Running amygdala check..."
    # The amygdala consumes the canonical event bus on Redis DB AMYGDALA_DB
    # (default 11). Most consumers' REDIS_URL ends in /0 because they default
    # to DB 0; rewrite the trailing DB segment so the amygdala lands on the
    # bus, not the cache. Stream key is controlled by EVENT_BUS_STREAM.
    AMYGDALA_DB="${AMYGDALA_DB:-11}"
    python3 /app/amygdala.py \
      --redis-url "${REDIS_URL%/*}/${AMYGDALA_DB}" \
      --vault /vault --brain-feed /vault/brain-feed \
      || notify_failure "amygdala check"
    echo "Amygdala check complete."

env:
  # Transcript-extraction knobs (consumed by the CronJob script above AND by
  # extract_workflow.py inside brain_keeper's workflow-template step).
  # EXTRACT_PROJECTS_DIR must point at a dir laid out as
  # <dir>/<project-dir>/*.jsonl (Claude Code projects layout, one level deep).
  EXTRACT_HOUR: "04"
  EXTRACT_SINCE: "26h"
  EXTRACT_MIN_TURNS: "5"
  EXTRACT_PROJECTS_DIR: "/shared/.claude/projects"
  # INFERENCE_URL is operator-specific — set empty default so the kernel can run
  # without an inference gateway (brain_tick will skip AI phase if unset).
  # Wire at any OpenAI-compatible endpoint: LiteLLM, OpenAI, Ollama, etc.
  # See docs/GATEWAY-CONTRACT.md.
  INFERENCE_URL: ""
  # Embeddings service base URL — consumed by embed_arcs.py after each tick
  # (main cron AND tick-drain) to refresh the pgvector index. In-cluster
  # default; override per environment to point at your embeddings Service.
  # EMBEDDINGS_API_KEY arrives via a secretRef.
  EMBEDDINGS_URL: "http://agentibrain-embeddings:8080"
  # Brain LLM model name (standard OpenAI `model` field). The kernel ships
  # `brain-brief` as the canonical name — wire your gateway to alias it at
  # whatever underlying model you want (Sonnet-class synthesis tier).
  BRAIN_BRIEF_MODEL: brain-brief
  # Self-healing knobs (see services/tick-engine/brain_keeper.py)
  BRAIN_STALE_SIGNAL_DAYS: "1"
  BRAIN_DECAY_START_DAYS: "2"
  BRAIN_DECAY_INTERVAL_DAYS: "2"
  # Event bus identifiers (see services/brain-ops/brain_tick.py). Override
  # per environment to namespace the stream and topic — the amygdala consumer
  # must read from the same stream key.
  EVENT_BUS_STREAM: "events:brain"
  EVENT_BUS_TOPIC: "agentibrain-system"
  EVENT_BUS_DB: "11"

# Operators override with their secrets provider (OpenBao / AWS SM / etc).
secretRef: brain-ops-secrets

# Optional list of EXTRA secret names to envFrom, in addition to `secretRef`.
# Use this when the credentials needed by brain-cron live across multiple
# secrets — e.g. the embed reaper needs EMBEDDINGS_API_KEY which usually
# lives in the kb-router secret rather than the ops/runner secret.
additionalSecretRefs: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Volume mounts — choose ONE of the two patterns:
#
#   1. NFS (operators with a shared filer):
#        nfsVault: { server: 10.x.y.z, path: /exports/vault }
#        nfsShared: { server: 10.x.y.z, path: /exports/shared }
#
#   2. PVC (standard K8s — use a PVC you've pre-provisioned):
#        vaultPVC: my-vault-pvc
#        sharedPVC: my-shared-pvc
#
# When neither is set, no vault volume is mounted and the tick will fail loudly
# on first read. The template guards each block; the chart installs cleanly
# with defaults so `helm template` / `helm lint` don't fail.
nfsVault: {}
nfsShared: {}
vaultPVC: ""
sharedPVC: ""

concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
backoffLimit: 1
activeDeadlineSeconds: 1200
restartPolicy: OnFailure

# ghcr.io images are public — pull secret only needed for forked private builds.
imagePullSecrets: []

# Amygdala continuous consumer (Deployment). Reads Redis stream for emergency signals.
amygdala:
  enabled: true
  pollInterval: "5"

# Tick queue consumer. Drains JSON requests enqueued by kb-router /tick at
# {vault}/brain-feed/ticks/requested/ on a short cadence. Processes each via
# brain_tick.py, moves to ticks/completed/ or ticks/failed/.
# Every 1 min so a forced brain_tick (MCP tool / POST /tick) is picked up within
# ~60s. Idempotent and exits immediately on an empty queue, so the extra fires
# are nearly free; concurrencyPolicy: Forbid skips a fire if one still runs.
tickDrain:
  enabled: true
  schedule: "*/1 * * * *"
  activeDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
