# Generic defaults for kb-router (FastAPI ingest + retrieval gateway).
#
# Defaults ship a portable, clone-and-deploy chart. Hostnames, NFS, and ESO
# are all empty/disabled by default so `helm install` works on a fresh
# cluster with only a `secretRef` Opaque Secret. Operators override env
# values, vault mount, and ESO via their own values overlay (see
# operator/values-overlays/agentibrain-kb-router/ for the Anton reference).
tpl:
  fullnameOverride: agentibrain-kb-router
  enableServiceLinks: false
  podAnnotations:
    reloader.stakater.com/auto: "true"
  global:
    environment: dev
    project: anton
  app:
    name: agentibrain-kb-router
    type: statefulset
    image:
      repository: ghcr.io/the-cloud-clock-work/agentibrain-kb-router
      tag: dev
      pullPolicy: Always
    replicaCount: 1
    container:
      port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
    healthChecks:
      enabled: true
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 30
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
  env:
    variables:
      # Service URLs default to namespace-less ClusterIP DNS — works in any
      # namespace where the kernel app-of-apps deployed alongside.
      OBSIDIAN_READER_URL: http://agentibrain-obsidian-reader:8080
      EMBEDDINGS_URL: http://agentibrain-embeddings:8080
      # Operator-side wiring — empty by default. Set in your overlay if you
      # have an artifact-store and an inference-gateway in the same cluster.
      ARTIFACT_STORE_URL: ""
      INFERENCE_URL: ""
      # Brain LLM model name (standard OpenAI `model` field). The kernel ships
      # `brain-classify` as the canonical name — wire your gateway to alias it
      # at whatever underlying model you want. See docs/GATEWAY-CONTRACT.md.
      BRAIN_CLASSIFY_MODEL: brain-classify
      VAULT_ROOT: /vault
      LOG_LEVEL: INFO
  secrets:
    enabled: true
    external:
      enabled: true
      # K8s Opaque Secret holding KB_ROUTER_TOKEN, OBSIDIAN_READER_TOKEN,
      # EMBEDDINGS_API_KEY (and any other tokens kb-router consumes).
      # Create manually with `local/k8s-bootstrap.sh` or via your secrets
      # manager (ESO/OpenBao/AWS SM — see externalSecret block below).
      secretName: agentibrain-router-secrets
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
  ingress:
    enabled: false
  database:
    enabled: false
  configMap:
    enabled: false
  securityContext:
    enabled: false
  serviceAccount:
    create: false
  rbac:
    create: false
  # ghcr.io images are public — pullSecret only needed for forked private
  # builds. Operators with a private mirror set this in their overlay.
  imagePullSecrets: []
  # ExternalSecrets (ESO) integration — disabled by default. Operators with
  # OpenBao / AWS SM / Vault flip `enabled: true` and point at their store.
  externalSecret:                                       # nosecret
    enabled: false                                      # nosecret
    storeName: openbao                                  # nosecret
    secretPath: k8s/agentibrain-router-dev              # nosecret
    targetSecretName: agentibrain-router-secrets        # nosecret
  # Vault mount — choose ONE of the two patterns:
  #
  #   1. NFS (operators with a shared filer):
  #        extraVolumes:
  #          - name: nfs-vault
  #            nfs:
  #              server: 10.x.y.z
  #              path: /exports/vault
  #
  #   2. PVC (standard K8s — pre-provision the PVC):
  #        extraVolumes:
  #          - name: vault-pvc
  #            persistentVolumeClaim:
  #              claimName: agentibrain-vault
  #
  # Default: empty. The kb-router process starts and serves /health, but any
  # vault read/write path will fail until a volume is mounted.
  extraVolumes: []
  extraVolumeMounts: []
