tpl:
  fullnameOverride: agentibrain-kb-router
  enableServiceLinks: false
  podAnnotations:
    reloader.stakater.com/auto: "true"
  global:
    environment: dev
    project: anton
  app:
    name: agentibrain-kb-router
    type: statefulset
    image:
      repository: ghcr.io/the-cloud-clock-work/agentibrain-kb-router
      tag: dev
      pullPolicy: Always
    replicaCount: 1
    container:
      port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
    healthChecks:
      enabled: true
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 30
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
  env:
    variables:
      OBSIDIAN_READER_URL: http://agentibrain-obsidian-reader.anton-dev.svc:8080
      EMBEDDINGS_URL: http://agentibrain-embeddings.anton-dev.svc:8080
      ARTIFACT_STORE_URL: http://10.10.30.130:8095
      INFERENCE_URL: http://10.10.30.130:8103
      INGEST_ROUTER_ROUTE: kb-router-classify
      VAULT_ROOT: /vault
      LOG_LEVEL: INFO
  secrets:
    enabled: true
    external:
      enabled: true
      secretName: agentibrain-router-secrets
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
  ingress:
    enabled: false
  database:
    enabled: false
  configMap:
    enabled: false
  securityContext:
    enabled: false
  serviceAccount:
    create: false
  rbac:
    create: false
  imagePullSecrets:
  - ghcr-pull-secret
  externalSecret:                                       # nosecret
    enabled: true                                       # nosecret
    storeName: openbao                                  # nosecret
    secretPath: k8s/agentibrain-router-dev              # nosecret
    targetSecretName: agentibrain-router-secrets        # nosecret
  extraVolumes:
    - name: nfs-vault
      nfs:
        server: 10.10.30.130
        path: /mnt/user/appdata/obsidian/vault
  extraVolumeMounts:
    - name: nfs-vault
      mountPath: /vault
