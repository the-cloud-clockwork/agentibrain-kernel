# Generic defaults for the MCP retrieval gateway (`agentibrain-mcp`).
#
# This chart deploys the MCP server image — a FastMCP stdio process wrapped
# by mcp-proxy for HTTP/SSE on port 8080. It exposes 4 tools for any agent
# to consume: `kb_search`, `kb_brief`, `brain_search_arcs`, `brain_get_arc`.
#
# Defaults ship a portable, clone-and-deploy chart. Hostnames + ESO are all
# empty/disabled by default so `helm install` works on a fresh cluster with
# only a `secretRef` Opaque Secret. Operators override env values and ESO
# via their own values overlay (see `examples/values-overlays/` for samples).
tpl:
  fullnameOverride: agentibrain-mcp
  enableServiceLinks: false
  podAnnotations:
    reloader.stakater.com/auto: "true"
  global:
    environment: dev
    project: agentibrain
  app:
    name: agentibrain-mcp
    type: statefulset
    image:
      repository: ghcr.io/the-cloud-clockwork/agentibrain-mcp
      tag: dev
      pullPolicy: Always
    replicaCount: 1
    container:
      port: 8080
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 384Mi
    healthChecks:
      enabled: true
      livenessProbe:
        httpGet:
          path: /ping
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 30
      readinessProbe:
        httpGet:
          path: /ping
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
  env:
    variables:
      # Service URLs default to namespace-less ClusterIP DNS — works in any
      # namespace where the kernel app-of-apps deployed alongside.
      BRAIN_API_URL: http://agentibrain-kb-router:8080
      EMBEDDINGS_URL: http://agentibrain-embeddings:8080
      # Operator-side wiring — empty by default. Set in your overlay when
      # `kb_brief` should hit a real OpenAI-compatible inference gateway.
      INFERENCE_URL: ""
      # Brain LLM model name (standard OpenAI `model` field). The kernel
      # ships `brain-brief` as the canonical name — wire your gateway to
      # alias it at whatever underlying model you want.
      BRAIN_BRIEF_MODEL: brain-brief
      KB_BRIEF_ROUTE: kb-brief
      MCP_PROXY_PORT: "8080"
      MCP_PROXY_STATELESS: "true"
      LOG_LEVEL: INFO
  secrets:
    enabled: true
    external:
      enabled: true
      # K8s Opaque Secret holding MCP_PROXY_API_KEY (bearer the proxy enforces
      # on inbound callers), BRAIN_API_TOKEN (or KB_ROUTER_TOKEN),
      # EMBEDDINGS_API_KEY, INFERENCE_API_KEY. Create manually with
      # `local/k8s-bootstrap.sh` or via your secrets manager (ESO/OpenBao/
      # AWS SM — see externalSecret block below).
      secretName: agentibrain-mcp-secrets
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
  ingress:
    enabled: false
  database:
    enabled: false
  configMap:
    enabled: false
  securityContext:
    enabled: false
  serviceAccount:
    create: false
  rbac:
    create: false
  # ghcr.io images are public — pullSecret only needed for forked private
  # builds. Operators with a private mirror set this in their overlay.
  imagePullSecrets: []
  # ExternalSecrets (ESO) integration — disabled by default. Operators with
  # OpenBao / AWS SM / Vault flip `enabled: true` and point at their store.
  externalSecret:                                       # nosecret
    enabled: false                                      # nosecret
    # storeName empty = chart-portable default. Operators set this in their
    # overlay to whatever ClusterSecretStore name their cluster uses.
    storeName: ""                                       # nosecret
    secretPath: ""                                      # nosecret
    targetSecretName: agentibrain-mcp-secrets           # nosecret
  # MCP is stateless and retrieval-only — no vault mount required. Vault
  # text search goes through brain-api /vault/search.
  extraVolumes: []
  extraVolumeMounts: []
