apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Chart.Name }}
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
      template:
        spec:
          restartPolicy: {{ .Values.restartPolicy }}
          containers:
            - name: brain-tick
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: {{- toYaml .Values.command | nindent 16 }}
              {{- if or .Values.env .Values.secretRef }}
              env:
                {{- range $key, $value := .Values.env }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
              {{- if .Values.secretRef }}
              envFrom:
                - secretRef:
                    name: {{ .Values.secretRef }}
              {{- end }}
              {{- end }}
              resources: {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                {{- if and .Values.nfsVault .Values.nfsVault.server }}
                - name: nfs-vault
                  mountPath: /vault
                {{- else if .Values.vaultPVC }}
                - name: vault
                  mountPath: /vault
                {{- end }}
                {{- if and .Values.nfsShared .Values.nfsShared.server }}
                - name: nfs-shared
                  mountPath: /shared
                  readOnly: true
                {{- else if .Values.sharedPVC }}
                - name: shared
                  mountPath: /shared
                  readOnly: true
                {{- end }}
          volumes:
            {{- if and .Values.nfsVault .Values.nfsVault.server }}
            - name: nfs-vault
              nfs:
                server: {{ .Values.nfsVault.server }}
                path: {{ .Values.nfsVault.path }}
            {{- else if .Values.vaultPVC }}
            - name: vault
              persistentVolumeClaim:
                claimName: {{ .Values.vaultPVC }}
            {{- end }}
            {{- if and .Values.nfsShared .Values.nfsShared.server }}
            - name: nfs-shared
              nfs:
                server: {{ .Values.nfsShared.server }}
                path: {{ .Values.nfsShared.path }}
                readOnly: true
            {{- else if .Values.sharedPVC }}
            - name: shared
              persistentVolumeClaim:
                claimName: {{ .Values.sharedPVC }}
            {{- end }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- range . }}
            - name: {{ . }}
            {{- end }}
          {{- end }}
