# Generic defaults for brain-cron (tick CronJob + amygdala Deployment).
#
# Ticks every 2 hours by default. The tick-engine image is ghcr.io/the-cloud-clock-work/agentibrain-tick-engine.
# Operators override environment-specific values (NFS server, INFERENCE_URL, secrets);
# see values-anton.yaml for the operator's production reference.

schedule: "7 */2 * * *"

image:
  repository: ghcr.io/the-cloud-clock-work/agentibrain-tick-engine
  tag: latest
  pullPolicy: Always

command:
  - /bin/sh
  - -c
  - |
    set -euo pipefail
    NTFY_URL="${NTFY_URL:-}"

    notify_failure() {
      if [ -n "$NTFY_URL" ]; then
        wget -q --post-data="brain-cron FAILED at $(date -u +%H:%M) UTC: $1" \
          --header="Title: Brain Cron Failure" \
          --header="Priority: high" \
          --header="Tags: skull,brain" \
          "$NTFY_URL/alerts" -O /dev/null 2>/dev/null || true
      fi
      exit 1
    }

    DATE=$(date -u +%Y-%m-%d)
    HOUR=$(date -u +%H)
    OUTDIR="/vault/clusters/$DATE"
    mkdir -p "$OUTDIR"
    chmod 777 "$OUTDIR"

    # Extraction: only at 04:00 UTC (first tick of the day)
    if [ "$HOUR" = "04" ]; then
      echo "Brain extraction: since=26h min-turns=5 out=$OUTDIR"
      python3 /app/extract.py --since 26h --min-turns 5 \
        --projects-dir /shared/.claude/projects \
        | python3 /app/cluster.py --out-dir "$OUTDIR" \
        || notify_failure "extraction phase"
      echo "Extraction done."
    else
      echo "Skipping extraction (hour=$HOUR, runs at 04 only)."
    fi

    echo "Running hybrid brain tick (with AI)..."
    python3 /app/brain_tick.py --vault /vault --brain-feed /vault/brain-feed \
      --inference-url "${INFERENCE_URL:-}" \
      || notify_failure "brain tick phase"
    echo "Brain tick complete."

    # Refresh embeddings + reap orphans. Diff-only by mtime, so the cost
    # is bounded to whatever the tick just rewrote. --prune deletes pgvector
    # rows whose cluster_id no longer has an arc file (graduations, merges,
    # renames). Failure is non-fatal — kb_search still works on stale rows.
    echo "Refreshing arc embeddings + pruning orphans..."
    if [ -n "${EMBEDDINGS_API_KEY:-}" ]; then
      python3 /app/embed_arcs.py --vault /vault --prune \
        || echo "WARN: embed_arcs failed (non-fatal)"
      echo "Embeddings refresh complete."
    else
      echo "Skipping embed_arcs (EMBEDDINGS_API_KEY not set)."
    fi

    echo "Running amygdala check..."
    python3 /app/amygdala.py \
      --redis-url "${REDIS_URL}" \
      --vault /vault --brain-feed /vault/brain-feed \
      || notify_failure "amygdala check"
    echo "Amygdala check complete."

env:
  # INFERENCE_URL is operator-specific — set empty default so the kernel can run
  # without an inference-gateway (brain_tick will skip AI phase if unset).
  INFERENCE_URL: ""
  # Self-healing knobs (see services/tick-engine/brain_keeper.py)
  BRAIN_STALE_SIGNAL_DAYS: "1"
  BRAIN_DECAY_START_DAYS: "2"
  BRAIN_DECAY_INTERVAL_DAYS: "2"

# Operators override with their secrets provider (OpenBao / AWS SM / etc).
secretRef: brain-cron-secrets

# Optional list of EXTRA secret names to envFrom, in addition to `secretRef`.
# Use this when the credentials needed by brain-cron live across multiple
# secrets — e.g. the embed reaper needs EMBEDDINGS_API_KEY which usually
# lives in the kb-router secret rather than the ops/runner secret.
additionalSecretRefs: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Volume mounts — choose ONE of the two patterns:
#
#   1. NFS (operators with a shared filer):
#        nfsVault: { server: 10.x.y.z, path: /exports/vault }
#        nfsShared: { server: 10.x.y.z, path: /exports/shared }
#
#   2. PVC (friends / standard K8s — use a PVC you've pre-provisioned):
#        vaultPVC: my-vault-pvc
#        sharedPVC: my-shared-pvc
#
# When neither is set, no vault volume is mounted and the tick will fail loudly
# on first read. The template guards each block; the chart installs cleanly
# with defaults so `helm template` / `helm lint` don't fail.
nfsVault: {}
nfsShared: {}
vaultPVC: ""
sharedPVC: ""

concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
backoffLimit: 1
activeDeadlineSeconds: 600
restartPolicy: OnFailure

imagePullSecrets:
  - ghcr-pull-secret

# Amygdala continuous consumer (Deployment). Reads Redis stream for emergency signals.
amygdala:
  enabled: true
  pollInterval: "5"

# Tick queue consumer. Drains JSON requests enqueued by kb-router /tick at
# {vault}/brain-feed/ticks/requested/ on a short cadence. Processes each via
# brain_tick.py, moves to ticks/completed/ or ticks/failed/.
# Keep schedule short (every 2-5 min); drain exits immediately on empty queue.
tickDrain:
  enabled: true
  schedule: "*/2 * * * *"
  activeDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
