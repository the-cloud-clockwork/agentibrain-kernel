services:
  brain-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/the-cloud-clockwork/agentibrain-brain-api:local
    container_name: agentibrain_brain_api
    restart: unless-stopped
    environment:
      - ARTIFACT_STORE_URL=${ARTIFACT_STORE_URL:-http://artifact-store:8080}
      - INFERENCE_URL=${INFERENCE_URL:-}
      - INFERENCE_API_KEY=${INFERENCE_API_KEY:-}
      - BRAIN_CLASSIFY_MODEL=${BRAIN_CLASSIFY_MODEL:-brain-classify}
      - LOCAL_READ_ROOTS=${LOCAL_READ_ROOTS:-/workspace,/mnt/ingest}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KB_ROUTER_TOKEN=${KB_ROUTER_TOKEN:-}
    ports:
      - "8102:8080"
    networks:
      - agentibrain_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# This compose is for solo-dev of brain-api in isolation.
# Postgres + Redis + optional MinIO), use `brain up` which renders the unified
# compose from agentibrain/templates/compose/.
networks:
  agentibrain_net:
    external: true
