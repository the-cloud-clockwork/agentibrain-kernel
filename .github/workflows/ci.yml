name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'anton' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: brain
          POSTGRES_PASSWORD: brain
          POSTGRES_DB: brain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brain -d brain"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (editable) + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff lint
        run: python -m ruff check agentibrain tests

      - name: Ruff format check
        run: python -m ruff format --check agentibrain tests

      - name: Import smoke
        run: python -c "import agentibrain; print(agentibrain.__version__)"

      - name: CLI smoke
        run: |
          brain --version
          brain version

      - name: Pytest
        run: python -m pytest -q tests/unit

      - name: Pytest (brain-ops service)
        run: python -m pytest -q services/brain-ops/tests

      - name: Pytest (embeddings service)
        env:
          # Pure target_dim + /health/deep tests always run; the DB-backed
          # reconcile tests use this DSN and skip if it is unreachable.
          EMBED_TEST_POSTGRES_URL: postgresql://brain:brain@localhost:5432/brain
        run: |
          pip install -r services/embeddings/requirements.txt
          python -m pytest -q services/embeddings/tests

      # Invalid escapes only surface on a FRESH compile, so bytecode caching
      # hides them locally while the container warns on every pod start. This
      # token-stream check is cache- and Python-version-independent.
      - name: Invalid escape sequences (brain-ops)
        run: python services/brain-ops/check_escapes.py services/brain-ops

  macos-smoke:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (editable) + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Import smoke
        run: python -c "import agentibrain; print(agentibrain.__version__)"

      - name: Pytest
        run: python -m pytest -q tests/unit

      - name: Pytest (brain-ops service)
        run: python -m pytest -q services/brain-ops/tests
