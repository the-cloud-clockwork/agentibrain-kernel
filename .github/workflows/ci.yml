name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (editable) + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check agentibrain tests

      - name: Ruff format check
        run: ruff format --check agentibrain tests

      - name: Import smoke
        run: python -c "import agentibrain; print(agentibrain.__version__)"

      - name: CLI smoke
        run: |
          brain --version
          brain version

      - name: Pytest
        run: pytest -q tests/unit
