name: docker-build

on:
  push:
    branches: [main, dev]
    paths:
      - "services/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - kb-router
          - obsidian-reader
          - embeddings
          - tick-engine
          - mcp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "tag=dev" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=pr-${{ github.event.number || github.run_id }}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build${{ steps.tag.outputs.push == 'true' && ' + push' || '' }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: ${{ steps.tag.outputs.push == 'true' }}
          # Only the floating tag is published (per no-hash-pins rule). Rollback
          # is `git revert` on main, which republishes :latest.
          tags: |
            ghcr.io/the-cloud-clockwork/agentibrain-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
