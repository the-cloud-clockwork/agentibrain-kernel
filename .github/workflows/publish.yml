name: publish

# Publishes the agentibrain Python package to PyPI on a tagged release.
#
# Tag format: v<version> (e.g. v0.1.0, v0.1.1). The tag's version must match
# agentibrain/__init__.__version__; CI fails fast otherwise.
#
# Authentication: PyPI trusted publishing via OIDC. Configure once in PyPI:
#   Project → Publishing → Add a trusted publisher
#     owner: The-Cloud-Clockwork
#     repo:  agentibrain-kernel
#     workflow: publish.yml
#     environment: pypi

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write  # Required for PyPI trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(python -c "import tomllib,pathlib; \
            exec(open('agentibrain/__init__.py').read()); print(__version__)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match package version $PKG_VERSION"
            exit 1
          fi
          echo "version match: $PKG_VERSION"

      - name: Build sdist + wheel
        run: python -m build

      - name: Smoke-install the wheel
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install --quiet dist/*.whl
          /tmp/verify/bin/brain --version
          /tmp/verify/bin/python -c "from agentibrain.bootstrap import migrations_dir; \
            assert migrations_dir().is_dir(), migrations_dir()"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
