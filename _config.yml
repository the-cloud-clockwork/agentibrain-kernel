# Jekyll configuration for agentibrain-kernel GitHub Pages

title: AgentiBrain
description: >-
  The brain + KB substrate for Claude Code agent fleets.
  HTTP contract, six Helm charts, brain-keeper agent, vault schema, MCP retrieval gateway, tick engine.
url: "https://the-cloud-clockwork.github.io"
baseurl: "/agentibrain-kernel"

remote_theme: just-the-docs/just-the-docs@v0.10.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

color_scheme: dark
search_enabled: true

mermaid:
  version: "11"

aux_links:
  GitHub: "https://github.com/The-Cloud-Clockwork/agentibrain-kernel"
aux_links_new_tab: true

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/The-Cloud-Clockwork/agentibrain-kernel"
gh_edit_branch: "main"
gh_edit_view_mode: "edit"

footer_content: >-
  AgentiBrain is open source under the
  <a href="https://github.com/The-Cloud-Clockwork/agentibrain-kernel/blob/main/LICENSE">MIT License</a>.
  Maintained by <a href="https://github.com/The-Cloud-Clockwork">The Cloud Clockwork</a>.

back_to_top: true
back_to_top_text: "Back to top"

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - agentibrain/
  - services/
  - tests/
  - scripts/
  - profiles/
  - agents/
  - helm/
  - api/
  - local/
  - examples/
  - operator/
  - observability/
  - "*.py"
  - "*.pyc"
  - __pycache__/
  - "*.egg-info"
  - dist/
  - build/
  - .venv/
  - venv/
  - .env
  - .env.example
  - pyproject.toml
  - compose.yml
  - CONTRIBUTING.md
  - CHANGELOG.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - CLAUDE.md
  - sonar-project.properties
  - Gemfile
  - Gemfile.lock
  - vendor/
